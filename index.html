<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>BMI Calculator</title>
</head>
<body>
  
  <div class="bmi">
    <h2>Body Mass Index (BMI) Calculator</h2>

    <div class="height">
      <label for="height">Your Height (cm):</label>
    <input type="number" id="height" placeholder="150" name="height">
    </div>

    <div class="weight">
      <label for="weight">Your Weight (kg):</label>
    <input type="number" id="weight" placeholder="65" name="weight">
    </div>

      <button id="calc">Calculator</button>
      <p id="ans"></p>
  </div>
  <script src="apps.js"></script>
</body>
</html>
